<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-blue-50">
    <!-- Header -->
    <header id="header" class="sticky top-0 z-50 transition-all duration-300 border-b-2 border-blue-300 bg-blue-100">
        <div class="container mx-auto flex items-center justify-between py-4 px-6 lg:px-8">
            
            <!-- Logo -->
            <div class="flex-shrink-0">
                <a href="#home" class="text-2xl text-blue-600 hover:text-blue-800 transition-colors duration-300" style="font-family: Inter; font-weight: 900;">
                    &lt;Daniel/&gt;
                </a>
            </div>

            <!-- Desktop Nav -->
            <nav class="hidden md:flex justify-end px-12 flex-1 space-x-9 text-blue-600 text-base" style="font-family: Inter; font-weight: 500;">
                <a href="#home" class="relative group transition-colors duration-300 hover:text-blue-800">
                    Home
                    <span class="absolute left-0 bottom-[-4px] h-[2px] bg-blue-400 transition-all duration-300 w-0 group-hover:w-full"></span>
                </a>
                <a href="#about" class="relative group transition-colors duration-300 hover:text-blue-800">
                    About
                    <span class="absolute left-0 bottom-[-4px] h-[2px] bg-blue-400 transition-all duration-300 w-0 group-hover:w-full"></span>
                </a>
                <a href="#skills" class="relative group transition-colors duration-300 hover:text-blue-800">
                    Skills
                    <span class="absolute left-0 bottom-[-4px] h-[2px] bg-blue-400 transition-all duration-300 w-0 group-hover:w-full"></span>
                </a>
                <a href="#projects" class="relative group transition-colors duration-300 hover:text-blue-800">
                    Projects
                    <span class="absolute left-0 bottom-[-4px] h-[2px] bg-blue-400 transition-all duration-300 w-0 group-hover:w-full"></span>
                </a>
                
            </nav>

            <!-- Desktop Contact Button -->
            <div class="hidden md:block">
                <button onclick="openContactModal()" class="bg-blue-200 hover:bg-blue-300 transition-all duration-300 px-4 py-2 rounded text-blue-700 font-medium">
                    Contact Me
                </button>
            </div>

            <!-- Mobile Menu Toggle -->
            <div class="md:hidden">
                <button onclick="toggleMobileMenu()" class="text-blue-600 hover:scale-110 transition-transform duration-200">
                    <svg id="menu-icon" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-gradient-to-b from-blue-100 to-blue-200 border-t border-blue-300 px-6 py-4 space-y-4">
            <a href="#home" class="block rounded p-2 transition text-blue-600 hover:bg-blue-300 hover:text-blue-800" style="font-family: Inter; font-weight: 500;" onclick="closeMobileMenu()">Home</a>
            <a href="#about" class="block rounded p-2 transition text-blue-600 hover:bg-blue-300 hover:text-blue-800" style="font-family: Inter; font-weight: 500;" onclick="closeMobileMenu()">About</a>
            <a href="#skills" class="block rounded p-2 transition text-blue-600 hover:bg-blue-300 hover:text-blue-800" style="font-family: Inter; font-weight: 500;" onclick="closeMobileMenu()">Skills</a>
            <a href="#projects" class="block rounded p-2 transition text-blue-600 hover:bg-blue-300 hover:text-blue-800" style="font-family: Inter; font-weight: 500;" onclick="closeMobileMenu()">Projects</a>
            <button onclick="openContactModal(); closeMobileMenu();" class="w-full bg-blue-200 hover:bg-blue-300 px-4 py-2 rounded text-blue-700 font-medium">
                Contact Me
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content">
        <!-- Content will be loaded here -->
    </main>
